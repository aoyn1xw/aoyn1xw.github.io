name: Deploy to GitHub Pages

on:
  push:
    branches:
      - preview # also deploy from preview branch

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          persist-credentials: false # Important for the deployment action to use its own token

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: List directory contents after build
        run: ls -la && ls -la build || echo "Build directory not found"

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build  # The folder Vite builds to
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: gh-pages
          clean: true
